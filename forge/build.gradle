    // Kotlin for Forge
    forgeRuntimeLibrary(implementation("thedarkcolour:kotlinforforge-neoforge:${kotlin_for_forge_version}"))

    // Cloth for config
    include(modCompileOnly("me.shedaniel.cloth:cloth-config-neoforge:${cloth_config_version}"))

    // Shade vs-core
    implementation("org.valkyrienskies.core:util:${rootProject.vs_core_version}")
    implementation("org.valkyrienskies.core:internal:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
    }
    runtimeOnly("org.valkyrienskies.core:impl:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
    }
    forgeRuntimeLibrary shadowCommon("org.valkyrienskies.core:impl:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    // region Manually include every single dependency of vs-core (total meme)
    forgeRuntimeLibrary include("org.valkyrienskies.core:api:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    forgeRuntimeLibrary shadowCommon("org.valkyrienskies.core:internal:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    forgeRuntimeLibrary include("org.valkyrienskies.core:util:${rootProject.vs_core_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    forgeRuntimeLibrary shadowCommon("org.valkyrienskies:physics_api_krunch:${rootProject.krunch_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    forgeRuntimeLibrary shadowCommon("org.valkyrienskies:physics_api:${rootProject.krunch_api_version}") {
        exclude group: 'org.joml', module: 'joml'
        transitive = false
    }

    forgeRuntimeLibrary include("javax.inject:javax.inject:1") { transitive = false }

    // JOML for Math
    forgeRuntimeLibrary include("org.joml:joml-primitives:1.10.0")

    // Apache Commons Math for Linear Programming
    forgeRuntimeLibrary include("org.apache.commons:commons-math3:3.6.1") { transitive = false }

    // Jackson Binary Dataformat for Object Serialization
    def jacksonVersion = '2.14.0'
    // forked to remove module-info
    forgeRuntimeLibrary include("com.fasterxml.jackson.module:jackson-module-kotlin:$jacksonVersion-rubyfork") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml.jackson.module:jackson-module-parameter-names:$jacksonVersion") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml.jackson.dataformat:jackson-dataformat-cbor:$jacksonVersion") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml.jackson.core:jackson-databind:$jacksonVersion") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml.jackson.core:jackson-annotations:$jacksonVersion") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml.jackson.core:jackson-core:$jacksonVersion") { transitive = false }
    forgeRuntimeLibrary include("com.github.Rubydesic:jackson-kotlin-dsl:1.2.0") { transitive = false }

    forgeRuntimeLibrary include("com.networknt:json-schema-validator:1.0.71") { transitive = false }
    forgeRuntimeLibrary include("com.ethlo.time:itu:1.7.0") { transitive = false }
    forgeRuntimeLibrary include("com.github.victools:jsonschema-module-jackson:4.25.0") { transitive = false }
    forgeRuntimeLibrary include("com.github.victools:jsonschema-generator:4.25.0") { transitive = false }
    forgeRuntimeLibrary include("com.fasterxml:classmate:1.5.1") { transitive = false }
    forgeRuntimeLibrary include("com.flipkart.zjsonpatch:zjsonpatch:0.4.11") { transitive = false }
    forgeRuntimeLibrary include("com.google.dagger:dagger:2.43.2") { transitive = false }

    // endregion
}

// I don't know why, but this is the only way gradle can launch it
tasks.runClient.configure {
    dependsOn(":common:classes")
    dependsOn("syncDevModsToml")
    jvmArgs '-Dkotlinx.coroutines.debug=off'
    dependsOn("syncDevClassOutputs")
}

tasks.runServer.configure {
    dependsOn(":common:classes")
    dependsOn("syncDevModsToml")
    jvmArgs '-Dkotlinx.coroutines.debug=off'
    dependsOn("syncDevClassOutputs")
}

// Copy the VS common access widener to the generated resources folder.
def generatedResourcesDir = layout.buildDirectory.dir("generated/resources")

tasks.register("copyAccessWidener", Copy) {
    from(project(":common").file("src/main/resources/valkyrienskies-common.accesswidener"))
    into(generatedResourcesDir)
}

processResources {
    dependsOn("copyAccessWidener")
    inputs.property "version", rootProject.mod_version

    filesMatching('META-INF/neoforge.mods.toml') {
        expand "version": rootProject.mod_version
    }
}

tasks.register("syncDevModsToml") {
    dependsOn(tasks.named("processResources"))

    doLast {
        def sourceToml = file("$buildDir/resources/main/META-INF/neoforge.mods.toml")
        if (!sourceToml.exists()) {
            return
        }

        [
            file("$projectDir/bin/main/META-INF"),
            file("$projectDir/out/production/resources/META-INF")
        ].each { targetDir ->
            targetDir.mkdirs()
            copy {
                from sourceToml
                into targetDir
            }
        }
    }
}

tasks.register("syncDevClassOutputs") {
    dependsOn(tasks.named("classes"))

    doLast {
        def javaClassesDir = file("$buildDir/classes/java/main")
        def kotlinClassesDir = file("$buildDir/classes/kotlin/main")
        def resourcesDir = file("$buildDir/resources/main")

        def ideBinMain = file("$projectDir/bin/main")
        def ideOutClasses = file("$projectDir/out/production/classes")
        def ideOutResources = file("$projectDir/out/production/resources")

        [ideBinMain, ideOutClasses, ideOutResources].each { it.mkdirs() }

        copy {
            from javaClassesDir, kotlinClassesDir, resourcesDir
            into ideBinMain
        }

        copy {
            from javaClassesDir, kotlinClassesDir
            into ideOutClasses
        }

        copy {
            from resourcesDir
            into ideOutResources
        }
    }
}

tasks.register('devNoShadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    exclude "fabric.mod.json"
    exclude "architectury.common.json"

    // Copy main forge code to this jar
    from(sourceSets.main.output)

    // Copy META-INF/accesstransformer.cfg from remapJar
    dependsOn tasks.named("remapJar")
    doFirst {
        def remapJarFile = tasks.named("remapJar").get().archiveFile.get().asFile

        from({
            zipTree(remapJarFile).matching {
                include "META-INF/accesstransformer.cfg"
            }
        })
    }

    // We still have to shade in the common jar, but nothing else
    configurations = [project.configurations.shadowCommonDevNoShadow]
    archiveClassifier.set("dev-no-shadow")
}

build.dependsOn devNoShadowJar

shadowJar {
    exclude "fabric.mod.json"
    exclude "architectury.common.json"
    // Exclude dummy Optifine classes
    exclude "net/optifine/**"
    exclude "org/apache/commons/**"

    configurations = [project.configurations.shadowCommon]
    archiveClassifier.set "dev-shadow"
}

remapJar {
    atAccessWideners.add "valkyrienskies-common.accesswidener"
    input.set shadowJar.archiveFile
    dependsOn shadowJar
    archiveClassifier.set null
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)
compileKotlin.compilerOptions.jvmTarget = JvmTarget.JVM_21

jar {
    archiveClassifier.set "dev"
}

sourcesJar {
    dependsOn("copyAccessWidener")
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    def commonSources = project(":common").sourcesJar
    dependsOn commonSources
    from commonSources.archiveFile.map { zipTree(it) }
}

components.java {
    withVariantsFromConfiguration(project.configurations.shadowRuntimeElements) {
        skip()
    }
}

publishing {
    publications {
        mavenForge(MavenPublication) {
            groupId = "org.valkyrienskies"
            version = project.version
            artifactId = rootProject.archives_base_name + "-" + project.name
            // Publish the dev shadow jar to maven
            artifact(shadowJar) {
                classifier "dev-shadow"
            }
            artifact(devNoShadowJar) {
                classifier "dev-no-shadow"
            }
            from components.java
        }
    }
}
