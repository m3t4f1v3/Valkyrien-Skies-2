# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

orbs:
  discord: antonioned/discord@0.1.0

executors:
  java_large:
    resource_class: large
    docker:
      - image: cimg/openjdk:21.0
    environment:
      ORG_GRADLE_PROJECT_block_external_repositories: "true"

commands:
  checkout_and_cache:
    steps:
      - checkout
      - run: git submodule sync
      - run: git submodule update --init

      - restore_cache:
          keys:
            - v1-gradle-home-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}
            - v1-gradle-home
      - restore_cache:
          keys:
            - v1-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}

  save_artifacts:
    parameters:
      artifact_name:
        type: string
        default: valkyrienskies
      version:
        type: string
        default: ${CIRCLE_SHA1}
    steps:
      - run: mkdir -p artifacts
      - run: |
          set -euo pipefail
          find ./forge/build/libs \
            -name "<< parameters.artifact_name >>*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-shadow.jar" \
            ! -name "*-javadoc.jar" \
            -exec bash -c 'cp "$0" "./artifacts/<< parameters.artifact_name >>-neoforge-<< parameters.version >>.jar"' {} \;
          find ./fabric/build/libs \
            -name "<< parameters.artifact_name >>*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            ! -name "*-shadow.jar" \
            ! -name "*-javadoc.jar" \
            -exec bash -c 'cp "$0" "./artifacts/<< parameters.artifact_name >>-fabric-<< parameters.version >>.jar"' {} \;
      - store_artifacts:
          path: artifacts
      # Make artifacts available to downstream jobs
      - persist_to_workspace:
          root: .
          paths:
            - artifacts

  save_artifacts_and_generate_discord:
    parameters:
      artifact_name:
        type: string
        default: valkyrienskies
      version:
        type: string
        default: ${CIRCLE_SHA1}
    steps:
      - save_artifacts:
          artifact_name: << parameters.artifact_name >>
          version: << parameters.version >>
      - run: >-
          echo 'export DISCORD_MSG="
          New version, **${CIRCLE_TAG}** |
          [Download NeoForge](https://output.circle-artifacts.com/output/job/${CIRCLE_WORKFLOW_JOB_ID}/artifacts/${CIRCLE_NODE_INDEX}/artifacts/<< parameters.artifact_name >>-neoforge-<< parameters.version >>.jar) |
          [Download Fabric](https://output.circle-artifacts.com/output/job/${CIRCLE_WORKFLOW_JOB_ID}/artifacts/${CIRCLE_NODE_INDEX}/artifacts/<< parameters.artifact_name >>-fabric-<< parameters.version >>.jar)
          "' >> "$BASH_ENV"

  save_gradle_cache:
    steps:
      - save_cache:
          key: v1-gradle-home-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}
          paths:
            - ~/.gradle
      - save_cache:
          key: v1-gradle-{{ checksum "build.gradle" }}-{{ checksum "gradle.properties" }}
          paths:
            - .gradle

  prepare_server_dir:
    parameters:
      server_root:
        type: string
    steps:
      - run:
          name: Prepare clean server directory
          command: |
            set -euo pipefail
            rm -rf "<< parameters.server_root >>"
            mkdir -p "<< parameters.server_root >>/mods"
            mkdir -p "<< parameters.server_root >>/config"

  run_test_server:
    parameters:
      cmd:
        type: string
      workdir:
        type: string
    steps:
      - run:
          name: Run dedicated production server
          command: |
            set -euo pipefail
            cd "<< parameters.workdir >>"
            
            # Accept eula automatically
            echo "eula=true" > eula.txt || true
            
            # Pipe "stop" into servers stdin so it closes right after a successful launch
            # Timeout 5 mins just in case, but we should either stop after launch, or error and move on
            timeout 5m echo "stop" | << parameters.cmd >> || true
            
            # Most reliable way I could find to detect a crash or not
            if grep -q "For help, type \"help\"" logs/latest.log; then
              echo "Server loaded successfully!"
              exit 0
            else
              echo "Server failed to start!"
              exit 1
            fi
      - store_artifacts:
          path: << parameters.workdir >>/logs
          when: always
      - store_artifacts:
          path: << parameters.workdir >>/latest.log
          when: always

jobs:
  gradle_build:
    executor: java_large
    steps:
      - checkout_and_cache
      - run:
          name: Build
          command: "./gradlew build --no-daemon --stacktrace"
      - save_artifacts
      - save_gradle_cache

  fabric_server_test:
    executor: java_large
    environment:
      MC_VERSION: "1.21.1"
      FABRIC_VERSION: "1.0.1"
    steps:
      - attach_workspace:
          at: .
      - prepare_server_dir:
          server_root: /tmp/fabric-server
      - run:
          name: Find built Fabric mod jar
          command: |
            set -euo pipefail
            FABRIC_JAR="$(pwd)/$(ls -1 artifacts/*-fabric-*.jar | head -n1)"
            if [ -z "${FABRIC_JAR}" ]; then
              echo "No Fabric jar found in artifacts/"
              ls -la artifacts || true
              exit 1
            fi
            echo "export FABRIC_MOD_JAR=${FABRIC_JAR}" >> "$BASH_ENV"
      - run:
          name: Download Fabric server
          command: |
            set -euo pipefail
            cd /tmp/fabric-server
            curl -L "https://maven.fabricmc.net/net/fabricmc/fabric-installer/${FABRIC_VERSION}/fabric-installer-${FABRIC_VERSION}.jar" -o fabric-installer-${FABRIC_VERSION}.jar
      - run:
          name: Install Fabric server
          command: |
            set -euo pipefail
            cd /tmp/fabric-server
            # Generates server.jar and required loader files for the requested MC version.
            java -jar fabric-installer-${FABRIC_VERSION}.jar server -downloadMinecraft -mcversion "${MC_VERSION}" -noprofile
            # Copy mod jar into mods/
            cp "${FABRIC_MOD_JAR}" mods/
      - run:
          name: Download Fabric API (latest compatible with ${MC_VERSION})
          command: |
            set -euo pipefail
            cd /tmp/fabric-server
            # Ask Modrinth for the newest Fabric API release that targets this MC version
            # instead of hard-coding a URL that has to be hand-updated each MC bump.
            FABRIC_API_URL=$(curl -fsSL \
              "https://api.modrinth.com/v2/project/fabric-api/version?game_versions=%5B%22${MC_VERSION}%22%5D&loaders=%5B%22fabric%22%5D" \
              | grep -oE '"url":"[^"]+\.jar"' | head -n1 | sed 's/"url":"//; s/"$//')
            if [ -z "${FABRIC_API_URL}" ]; then
              echo "Could not resolve a Fabric API version for MC ${MC_VERSION}"
              exit 1
            fi
            curl -L "${FABRIC_API_URL}" -o mods/fabric-api.jar
      - run_test_server:
          cmd: "java -Xmx2G -Xms2G -jar fabric-server-launch.jar nogui"
          workdir: "/tmp/fabric-server"

  forge_server_test:
    executor: java_large
    environment:
      MC_VERSION: "1.21.1"
      NEOFORGE_VERSION: "21.1.206"
    steps:
      - attach_workspace:
          at: .
      - prepare_server_dir:
          server_root: /tmp/forge-server
      - run:
          name: Find built NeoForge mod jar
          command: |
            set -euo pipefail
            # save_artifacts names the produced jar <name>-neoforge-<sha>.jar since the
            # forge/ subproject builds for NeoForge 21.1.
            FORGE_JAR="$(pwd)/$(ls -1 artifacts/*-neoforge-*.jar | head -n1)"
            if [ -z "${FORGE_JAR}" ]; then
              echo "No NeoForge jar found in artifacts/"
              ls -la artifacts || true
              exit 1
            fi
            echo "export FORGE_MOD_JAR=${FORGE_JAR}" >> "$BASH_ENV"
      - run:
          name: Download NeoForge server installer
          command: |
            set -euo pipefail
            cd /tmp/forge-server
            curl -L "https://maven.neoforged.net/releases/net/neoforged/neoforge/${NEOFORGE_VERSION}/neoforge-${NEOFORGE_VERSION}-installer.jar" -o neoforge-installer.jar
      - run:
          name: Install NeoForge server
          command: |
            set -euo pipefail
            cd /tmp/forge-server
            java -jar neoforge-installer.jar --installServer
            # Copy the mod into mods/
            cp "${FORGE_MOD_JAR}" mods/
      - run:
          name: Download Kotlin For Forge (NeoForge, latest compatible with ${MC_VERSION})
          command: |
            set -euo pipefail
            cd /tmp/forge-server
            # Modrinth project 'ordsPcFz' is Kotlin For Forge. Fetch the newest neoforge
            # jar for this MC version instead of pinning a URL.
            KFF_URL=$(curl -fsSL \
              "https://api.modrinth.com/v2/project/ordsPcFz/version?game_versions=%5B%22${MC_VERSION}%22%5D&loaders=%5B%22neoforge%22%5D" \
              | grep -oE '"url":"[^"]+\.jar"' | head -n1 | sed 's/"url":"//; s/"$//')
            if [ -z "${KFF_URL}" ]; then
              echo "Could not resolve a Kotlin For Forge (NeoForge) version for MC ${MC_VERSION}"
              exit 1
            fi
            curl -L "${KFF_URL}" -o mods/kff.jar
      - run_test_server:
          cmd: "./run.sh nogui"
          workdir: "/tmp/forge-server"

  publish_to_maven:
    executor: java_large
    steps:
      - checkout_and_cache
      - run:
          name: Build
          command: "./gradlew build publish --no-daemon --stacktrace"

  deploy_to_curse:
    executor: java_large
    steps:
      - checkout_and_cache
      - run: echo 'export ORG_GRADLE_PROJECT_CustomReleaseVersion=${CIRCLE_TAG}' >> "$BASH_ENV"
      - run:
          command: "./gradlew build modrinth curseforge publish --no-daemon --stacktrace --continue"

  notify_playtesters:
    executor: java_large
    steps:
      - checkout_and_cache
      - run:
          name: Build
          command: "./gradlew build --no-daemon --stacktrace"
      - save_artifacts_and_generate_discord
      - discord/status:
          success_message: ${DISCORD_MSG}
          success_only: true
          webhook: ${VS2_1192_WEBHOOK}

workflows:
  build:
    jobs:
      - gradle_build:
          context:
            - valkyrien_maven

      - fabric_server_test:
          requires:
            - gradle_build
          context:
            - valkyrien_maven

      - forge_server_test:
          requires:
            - gradle_build
          context:
            - valkyrien_maven

      - notify_playtesters:
          filters:
            tags:
              only: /^playtest.*/
            branches:
              ignore: /.*/
          context:
            - discord_webhooks
            - valkyrien_maven

      - deploy_to_curse:
          filters:
            tags:
              only: /^release.*/
            branches:
              ignore: /.*/
          context:
            - curse_publishing
            - valkyrien_maven

      - publish_to_maven:
          filters:
            branches:
              only:
                - /.*\/main/
          context:
            - valkyrien_maven
            - github_maven
