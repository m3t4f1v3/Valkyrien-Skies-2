name: Compatibility Issue
description: Let us know about a bug that occurs when another mod is installed
title: '<title>'
labels: compat
assignees: []
body:
- type: markdown
  attributes:
    value: |
      **Note:** do not report issues with the following mods:
      - Optifine
      - Magma Server (maybe try Arclight?)
      - Sable
      - Radium (on 1.20.x)
- type: input
  attributes:
    label: Mod Name
    description: The name of the mod that causes the compatibility issue.
  validations:
    required: true
- type: checkboxes
  attributes:
    label: This issue occurs when only Valkyrien Skies, addons, and the mod I have specified are installed and no other mods
    options:
      - label: I have tested this issue and it occurs with only Valkyrien Skies, addons, and the mod I have specified
- type: checkboxes
  attributes:
    label: Minecraft Version
    description: Which Minecraft versions display this issue?
    options:
      - label: 1.20.x
      - label: 1.21.x
      - label: Older (Unsupported)
  validations:
    required: true
- type: checkboxes
  attributes:
    label: Mod Loader
    description: Which mod loaders display this issue?
    options:
      - label: Forge
      - label: NeoForge
      - label: Fabric
      - label: Quilt
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: Describe the expected behavior.
  validations:
    required: true
- type: textarea
  attributes:
    label: Actual Behavior
    description: Describe the actual displayed behavior, and how it differs from expected.
  validations:
    required: true
- type: textarea
  attributes:
    label: How to Reproduce
    description: Describe how to reproduce your issue; Descriptive steps are preferred.
  validations:
    required: true
- type: textarea
  attributes:
    label: Logs
    description: Upload to https://mclo.gs/ and paste a link, or alternatively go to `.minecraft/logs` and drag and drop the `latest.log` and `debug.log` file into this text field.
