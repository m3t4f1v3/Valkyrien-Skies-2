name: Label verified playtester issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  label-verified:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Label verified playtesters
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const verifiedUsers = JSON.parse(
              fs.readFileSync(".github/playtesters.json", "utf8")
            );

            const author = context.payload.issue.user.login;

            if (!verifiedUsers.includes(author)) {
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ["Verified Playtester"]
            });
